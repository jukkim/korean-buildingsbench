# Korean_BB Transformer Medium v3 — 101K Step-Scaled Config
# EXP-007 Experiment 1: 101K 건물에 맞게 warmup 조정
# warmup_steps 10000→6000 (steps의 ~10%)
# max_steps 42100→62000 (0.225 epochs at 101K)

[model]
context_len = 168
pred_len = 24
num_encoder_layers = 3
num_decoder_layers = 3
d_model = 512
nhead = 8
dim_feedforward = 1024
dropout = 0.0
activation = 'gelu'
continuous_loads = true
continuous_head = 'gaussian_nll'
ignore_spatial = false

[train]
batch_size = 128
lr = 0.00006               # BB-M 동일
warmup_steps = 6000         # 101K 기준: 62K steps의 ~10%
epochs = 50
apply_scaler_transform = 'boxcox'
init_scale = 0.02
grad_clip = 0.0
val_every = 1
patience = 15

[eval]
apply_scaler_transform = 'boxcox'
