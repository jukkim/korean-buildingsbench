# Korean_BB Transformer Medium v3 — 3K Balanced Config
# 방안 E: 아키타입별 3K 균등 샘플링 (14 archetypes × 3K = 42K buildings)
# restaurant 27% → ~7%, office/school/university 비중 정상화
# Steps: 42K buildings × 344 windows / 128 batch × 0.35 epochs ≈ 40,000 steps

[model]
context_len = 168
pred_len = 24
num_encoder_layers = 3
num_decoder_layers = 3
d_model = 512
nhead = 8
dim_feedforward = 1024
dropout = 0.0
activation = 'gelu'
continuous_loads = true
continuous_head = 'gaussian_nll'
ignore_spatial = false
use_revin = false

[train]
batch_size = 128
lr = 0.00006               # BB-M 동일
warmup_steps = 4000         # 40K steps의 10%
epochs = 50
apply_scaler_transform = 'boxcox'
init_scale = 0.02
grad_clip = 0.0
val_every = 1
patience = 15

[eval]
apply_scaler_transform = 'boxcox'
