# Korean_BB Transformer Large (진짜 BB-L) — 768/12/12
# BB 공식 L config 그대로: d_model=768, nhead=12, 12+12 layers, ff=2048
# EXP-032: sparse sweep으로 L 성능 경향 파악

[model]
context_len = 168
pred_len = 24
num_encoder_layers = 12
num_decoder_layers = 12
d_model = 768
nhead = 12
dim_feedforward = 2048
dropout = 0.0
activation = 'gelu'
continuous_loads = true
continuous_head = 'gaussian_nll'
ignore_spatial = false
use_revin = true

[train]
batch_size = 128
lr = 0.00006
warmup_steps = 4000
epochs = 50
apply_scaler_transform = 'boxcox'
init_scale = 0.02
grad_clip = 0.0
val_every = 1
patience = 15

[eval]
apply_scaler_transform = 'boxcox'
