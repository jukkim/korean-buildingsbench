# M config for BB subset RevIN OFF ablation
[model]
context_len = 168
pred_len = 24
num_encoder_layers = 3
num_decoder_layers = 3
d_model = 512
nhead = 8
dim_feedforward = 1024
dropout = 0.0
activation = 'gelu'
continuous_loads = true
continuous_head = 'gaussian_nll'
ignore_spatial = false
use_revin = false

[train]
batch_size = 128
lr = 0.00006
warmup_steps = 4000
epochs = 50
apply_scaler_transform = 'boxcox'
init_scale = 0.02
grad_clip = 1.0
val_every = 1
patience = 15

[eval]
apply_scaler_transform = 'boxcox'
