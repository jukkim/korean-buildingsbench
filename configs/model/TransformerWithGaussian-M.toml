# Korean_BB Transformer Medium — BB TransformerWithGaussian-M 기반
# ~18M params, 단일 GPU 학습 가능

[model]
context_len = 168
pred_len = 24
num_encoder_layers = 3
num_decoder_layers = 3
d_model = 512
nhead = 8
dim_feedforward = 1024
dropout = 0.0
activation = 'gelu'
continuous_loads = true
continuous_head = 'gaussian_nll'
ignore_spatial = false

[train]
batch_size = 64
lr = 0.00006
warmup_epochs = 2
epochs = 50
apply_scaler_transform = 'boxcox'
init_scale = 0.02
grad_clip = 1.0
val_every = 1        # 매 에폭 검증
patience = 10        # early stopping patience

[eval]
apply_scaler_transform = 'boxcox'
