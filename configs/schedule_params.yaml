# 스케줄 클래스 정의 및 확률적 변동 파라미터
# 22개 클래스 × 확률적 변동 = 1,550+ 고유 아키타입

# ============================================================
# 공통 확률적 변동 파라미터
# ============================================================
stochastic_defaults:
  arrival_sigma_h: 0.5      # 출근시간 표준편차 (시간)
  departure_sigma_h: 0.75   # 퇴근시간 표준편차
  lunch_start_sigma_h: 0.25 # 점심시간 표준편차
  lunch_duration_mean_h: 1.0
  lunch_duration_sigma_h: 0.15
  weekend_ratio_range: [0.0, 0.3]  # 주말 운영 비율
  night_occupancy_range: [0.02, 0.10]
  seasonal_sigma: 0.1       # 계절 변동 표준편차

# ============================================================
# 한국 공휴일
# ============================================================
holidays:
  fixed:
    - {month: 1, day: 1, name: 신정}
    - {month: 3, day: 1, name: 삼일절}
    - {month: 5, day: 5, name: 어린이날}
    - {month: 6, day: 6, name: 현충일}
    - {month: 8, day: 15, name: 광복절}
    - {month: 10, day: 3, name: 개천절}
    - {month: 10, day: 9, name: 한글날}
    - {month: 12, day: 25, name: 크리스마스}
  lunar:  # 매년 날짜 변동 → 시뮬 연도별 계산
    - {name: 설날, days: 3}
    - {name: 추석, days: 3}
    - {name: 부처님오신날, days: 1}

